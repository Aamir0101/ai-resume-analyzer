services:
  - type: web
    name: resume-analyser-backend
    env: node
    region: oregon
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
